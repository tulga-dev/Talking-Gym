name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Stage app secrets from GitHub secrets
        run: |
          flyctl secrets set --stage -a talking-gym-mn \
            TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            XAI_API_KEY="${{ secrets.XAI_API_KEY }}" \
            SUPABASE_DB_URL="${{ secrets.SUPABASE_DB_URL }}" \
            ADMIN_CHAT_ID="${{ secrets.ADMIN_CHAT_ID }}"
          # Optional Google Sign-In — staged only when present
          if [ -n "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then
            flyctl secrets set --stage -a talking-gym-mn \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
          fi
          # Optional founder/test accounts exempt from the voice cap
          if [ -n "${{ secrets.FOUNDER_IDS }}" ]; then
            flyctl secrets set --stage -a talking-gym-mn \
              FOUNDER_IDS="${{ secrets.FOUNDER_IDS }}"
          fi
          # Optional Messenger channel secrets — staged only when present
          if [ -n "${{ secrets.MESSENGER_PAGE_TOKEN }}" ]; then
            flyctl secrets set --stage -a talking-gym-mn \
              MESSENGER_PAGE_TOKEN="${{ secrets.MESSENGER_PAGE_TOKEN }}" \
              MESSENGER_VERIFY_TOKEN="${{ secrets.MESSENGER_VERIFY_TOKEN }}" \
              MESSENGER_APP_SECRET="${{ secrets.MESSENGER_APP_SECRET }}"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy (single machine — two pollers would conflict)
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
