# Fly.io config — Talking Gym runs as a single long-polling worker.
# No HTTP service: nothing listens, so no ports/health checks here.
# Deploys go through GitHub Actions (.github/workflows/deploy.yml),
# which stages app secrets from GitHub repo secrets on every push.

app = "talking-gym-mn"
primary_region = "sin"   # hkg is deprecated on Fly; latency is irrelevant for a polling bot

[build]
  # uses ./Dockerfile

[processes]
  bot = "python main.py"

# HTTPS endpoint for the Facebook Messenger webhook (and health checks).
# The Telegram side still uses long polling; auto-stop must stay OFF so the
# poller keeps running even with no inbound HTTP traffic.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["bot"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  processes = ["bot"]
